comment_templates:
  wheeled-legged: "directly relevant to wheeled-legged robot research"
  wheel-legged: "directly relevant to wheeled-legged robot research"
  sim2real: "relevant to sim-to-real transfer pipeline"
  sim-to-real: "relevant to sim-to-real transfer pipeline"
  terrain: "relevant to terrain adaptation and traversal"
  isaac: "uses Isaac Lab/Gym simulation environment"
  mujoco: "uses MuJoCo simulation environment"
  locomotion: "relevant to locomotion control"
  legged: "relevant to legged robot research"
  bipedal: "relevant to bipedal locomotion"
  quadruped: "relevant to quadruped robot research"
