llm:
  enable_llm_scoring: true
  llm_score_threshold: 18
  batch_size: 5
  claude_command: claude
  claude_flags: --permission-mode bypassPermissions --print
  model: sonnet
research_profile: '研究方向：机器人运动控制、导航与感知的一体化系统，核心项目是 OmniBot（轮足/四足机器人），重点关注 locomotion
  policy learning、terrain adaptation、state estimation、navigation、sim-to-real / sim2sim。

  使用 Isaac Lab 训练、MuJoCo Sim2Sim 验证，并面向实机部署与 IEEE RA-L 论文选题。


  【高优先级】

  - 四足 / 轮足 / 人形 locomotion、whole-body control、gait、rough terrain、contact-rich control

  - 机器人导航、SLAM、visual/lidar odometry、terrain perception、traversability estimation

  - sim-to-real、domain randomization、system identification、deployable robot learning

  - 与机器人感知直接耦合的论文：感知模块必须服务控制、导航、建图、状态估计或部署


  【中优先级】

  - 机器人感知/视觉论文，但需明确面向 mobile robot / legged / navigation / autonomy

  - MPC / CBF / classical control，只要与机器人运动控制或导航强相关


  【低优先级】

  - 纯 manipulation / grasp / teleoperation / prosthesis / exoskeleton

  - 纯 VLA / embodied agent / 通用视觉表征，如果没有直接落到机器人控制/导航/部署

  - 与机器人弱相关的泛 CV / 泛 AI / 泛 RL 论文


  评分时宁可漏掉边缘相关论文，也不要把大量泛 AI/CV 噪声推到日报里。'
